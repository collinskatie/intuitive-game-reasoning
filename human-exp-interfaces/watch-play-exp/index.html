		<style> 
			body, html {
				margin: 0;
				padding: 0;
				box-sizing: border-box;
			}
			
			#gameBoard {
				display: grid;
				grid-template-columns: repeat(auto-fill, minmax(10px, 1fr));
				gap: 0; /* Ensure no gaps between cells */
				justify-content: center;
				align-items: center;
				
			}
			
			.cell {
				width: 40px;
				height: 40px;
				background-color: white;
				border: 0;
				padding: 0;
				border: 2px solid black;
				justify-content: center;
				align-items: center;         
				font-size: 1.5rem;           
				font-weight: bold;          
				text-align: center;
			}

			.cell:hover {
				box-shadow: 0 0 0 2px transparent; /* Default hover effect */
			}
			
			.cell.hover-blue:hover {
				background: blue;
				opacity: 0.5;
			}
			
			.cell.hover-red:hover {
				background: red;
				opacity: 0.5;
			}

			.cell.hover-green:hover {
				background: green;
				opacity: 0.5;
			}

			/*Help from: https://dev.to/abthakur/making-the-default-html-button-appealing-645*/

			input#undo-btn.buttons{

				padding: 10px 20px;
				cursor: pointer;
				transition: background-color 0.2s ease-in-out;
				margin-left :5px;

				input#undo-btn.buttons:hover{

				}
